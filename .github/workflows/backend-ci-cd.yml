name: Backend CI/CD

on:
  pull_request:
    paths:
      - "backend/**"
      - "shared/**"
      - ".github/workflows/backend-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "shared/**"
      - ".github/workflows/backend-ci-cd.yml"

env:
  PYTHON_VERSION: "3.11"
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: talkco-backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: talkco
          POSTGRES_PASSWORD: talkco
          POSTGRES_DB: talkco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talkco -d talkco_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run backend tests
        working-directory: backend
        env:
          OPENAI_API_KEY: test-key
          DATABASE_URL: postgresql://talkco:talkco@localhost:5432/talkco_test
          TEST_DATABASE_URL: postgresql://talkco:talkco@localhost:5432/talkco_test
        run: python -m pytest tests/ -v

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev" --quiet

      - name: Make deploy script executable
        run: chmod +x backend/scripts/deploy_cloud_run.sh

      - name: Build, push, and deploy Cloud Run
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GAR_LOCATION: ${{ env.GAR_LOCATION }}
          GAR_REPOSITORY: ${{ env.GAR_REPOSITORY }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ./backend/scripts/deploy_cloud_run.sh
